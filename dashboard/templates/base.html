<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lead-Gen Pipeline — Social Media Lead Generation Dashboard with Human-in-the-Loop">
    <title>{% block title %}Lead-Gen Pipeline{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
</head>
<body>
    <div class="app-layout">
        <!-- ── Sidebar ──────────────────────────────────── -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon">🔬</div>
                <div class="sidebar-brand-text">
                    LeadGen Pipeline
                    <span>BCI PoC v0.1</span>
                </div>
            </div>

            <nav>
                <ul class="sidebar-nav">
                    <li>
                        <a href="/dashboard" class="sidebar-item {% if active_page == 'home' %}sidebar-item--active{% endif %}" id="nav-home">
                            <span class="sidebar-item-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                            </span>
                            Home
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/reddit" class="sidebar-item {% if active_page == 'reddit' %}sidebar-item--active{% endif %}" id="nav-reddit">
                            <span class="sidebar-item-icon">
                                <svg viewBox="0 0 24 24" fill="#FF4500"><circle cx="12" cy="12" r="10"/><path d="M16.5 13.5c0 1.38-2.01 2.5-4.5 2.5s-4.5-1.12-4.5-2.5" fill="none" stroke="#fff" stroke-width="1.2"/><circle cx="9" cy="11" r="1.2" fill="#fff"/><circle cx="15" cy="11" r="1.2" fill="#fff"/><circle cx="17.5" cy="7.5" r="1" fill="#FF4500" stroke="#fff" stroke-width="0.5"/><path d="M12 3v4" stroke="#fff" stroke-width="1"/></svg>
                            </span>
                            Reddit
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/x" class="sidebar-item {% if active_page == 'x' %}sidebar-item--active{% endif %}" id="nav-x">
                            <span class="sidebar-item-icon">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                            </span>
                            X (Twitter)
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/youtube" class="sidebar-item {% if active_page == 'youtube' %}sidebar-item--active{% endif %}" id="nav-youtube">
                            <span class="sidebar-item-icon">
                                <svg viewBox="0 0 24 24" fill="#FF0000"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/><polygon fill="#fff" points="9.545,15.568 15.818,12 9.545,8.432"/></svg>
                            </span>
                            YouTube
                        </a>
                    </li>
                    <li>
                        <a href="/dashboard/quora" class="sidebar-item {% if active_page == 'quora' %}sidebar-item--active{% endif %}" id="nav-quora">
                            <span class="sidebar-item-icon">
                                <svg viewBox="0 0 24 24" fill="#B92B27"><path d="M12.735 19.489c-.678-1.269-1.49-2.576-3.146-2.576-.376 0-.752.082-1.082.252l-.614-1.16c.834-.744 2.024-1.282 3.61-1.282 1.904 0 3.222.876 4.142 2.236.648-1.26.978-2.88.978-4.868 0-4.776-1.856-7.572-5.392-7.572-3.46 0-5.392 2.796-5.392 7.572s1.932 7.572 5.392 7.572c.558 0 1.074-.068 1.504-.174zM12.231 24C5.476 24 0 18.522 0 12S5.476 0 12.231 0C18.988 0 24 5.478 24 12s-5.012 12-11.769 12z"/></svg>
                            </span>
                            Quora
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                Pipeline v0.1 · PoC
            </div>
        </aside>

        <!-- ── Main Content ─────────────────────────────── -->
        <main class="main-content">
            <header class="header-bar">
                <h1 class="header-title">{% block page_title %}Dashboard{% endblock %}</h1>
                <div class="header-actions">
                    <a href="https://github.com/wrathog12/Lead-Gen-Pipeline-For-Social-Media" target="_blank" class="header-pill" id="btn-github">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                        GitHub
                    </a>
                    <a href="https://github.com/wrathog12/Lead-Gen-Pipeline-For-Social-Media#readme" target="_blank" class="header-pill" id="btn-docs">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        Docs
                    </a>
                </div>
            </header>

            <div class="page-content fade-in">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
